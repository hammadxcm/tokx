name: Feature Request
description: Suggest a new feature for tokx
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      placeholder: How would this feature help you?
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@tokx/core"
        - "tokx-cli"
        - "@tokx/web"
        - "All"
