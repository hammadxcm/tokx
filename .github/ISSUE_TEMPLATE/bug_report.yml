name: Bug Report
description: Report a bug in tokx
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@tokx/core"
        - "tokx-cli"
        - "@tokx/web"
    validations:
      required: true
