[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tokx"
version = "0.1.1"
description = "JWT decode, encode, verify from your terminal"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
authors = [
    {name = "Hammad Khan"}
]
keywords = ["jwt", "json-web-token", "cli", "decode", "encode", "verify"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
    "Topic :: Utilities",
]

[project.urls]
Homepage = "https://github.com/hammadxcm/tokx"
Repository = "https://github.com/hammadxcm/tokx"
Issues = "https://github.com/hammadxcm/tokx/issues"

[project.scripts]
tokx = "tokx:main"

[tool.setuptools.packages.find]
include = ["tokx"]
